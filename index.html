<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            color: #333;
        }

        /* 404数字动画效果 */
        .error-code {
            font-size: 12rem;
            font-weight: 700;
            color: #4a6cf7;
            position: relative;
            animation: float 3s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .error-message {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            max-width: 600px;
            padding: 0 20px;
        }

        /* 返回首页按钮样式 */
        .home-btn {
            padding: 12px 30px;
            background-color: #4a6cf7;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .home-btn:hover {
            background-color: #3554e4;
            transform: scale(1.05);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .error-code {
                font-size: 8rem;
            }
            .error-message {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 6rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <div class="error-message">
        哎呀！你访问的页面走丢了<br>
        可能是网址输入错误，或者页面已被移除
    </div>
    <a href="/" class="home-btn">返回首页</a>
</body>
</html>
